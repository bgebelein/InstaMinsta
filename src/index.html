<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quadra Cam</title>
    <link rel="stylesheet" href="styles.min.css" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="img/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="img/favicon/favicon-96x96.png"
    />
    <link rel="manifest" href="site.webmanifest" />
    <link
      rel="mask-icon"
      href="img/favicon/safari-pinned-tab.svg"
      color="#000000"
    />
    <meta name="apple-mobile-web-app-title" content="Quadra Cam" />
    <meta name="application-name" content="Quadra Cam" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body class="bg-black touch-manipulation">
    <div
      id="camera"
      class="relative mx-auto aspect-square max-h-screen"
    >
      <video id="video-preview" class="size-full object-cover object-center" muted playsinline>
        Video stream not available.
      </video>
      <div
        id="grid"
        class="absolute top-0 left-0 size-full before:absolute before:left-1/3 before:block before:h-full before:w-1/3 before:border-x before:border-white/35 after:absolute after:top-1/3 after:block after:h-1/3 after:w-full after:border-y after:border-white/35"
      ></div>

      <canvas class="absolute top-0 left-0 size-full -z-10"></canvas>
    </div>

    <footer class="w-full fixed bottom-12 left-1/2 z-10 -translate-x-1/2">
      <div
        id="filter-selection"
        class="scrollbar-none flex items-center gap-3 overflow-x-scroll px-3 py-12"
      ></div>

      <div
        id="camera-buttons"
        class="max-w-sm flex items-center justify-evenly py-2 mx-auto *:cursor-pointer *:transition-colors"
      >
        <button id="switch-camera" aria-label="Switch Camera" class="p-4 bg-black/20 rounded-full leading-1 hover:opacity-80 active:opacity-60 active:bg-black/40">
          <iconify-icon
            icon="lucide:switch-camera"
            width="24"
            height="24"
            class="text-white"
          ></iconify-icon>
        </button>

        <button
          id="snap"
          class="size-14 rounded-full bg-white outline-2 outline-offset-3 outline-white hover:bg-white/80 active:bg-white/60"
          aria-label="Take Snapshot"
        ></button>

        <button id="toggle-torch" aria-label="Toggle Torch" class="p-4 bg-black/20 rounded-full leading-1 hover:opacity-80 active:opacity-60 active:bg-black/40 disabled:opacity-20 disabled:cursor-not-allowed">
          <iconify-icon
            icon="lucide:zap"
            width="24"
            height="24"
            class="text-white"
          ></iconify-icon>
        </button>
      </div>
    </footer>

    <a id="photo" download hidden></a>

    <!-- Iconify Web Component -->
    <script src="https://code.iconify.design/iconify-icon/3.0.2/iconify-icon.min.js"></script>
    <!-- Main JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
