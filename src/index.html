<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quadra Cam</title>
    <link rel="stylesheet" href="style.min.css" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="site.webmanifest" />
    <link
      rel="mask-icon"
      href="images/favicon/safari-pinned-tab.svg"
      color="#000000"
    />
    <meta name="apple-mobile-web-app-title" content="Quadra Cam" />
    <meta name="application-name" content="Quadra Cam" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body class="bg-black">
    <div
      id="camera"
      class="relative mx-auto aspect-square max-h-screen translate-y-1/3 sm:translate-0"
    >
      <video id="video-preview" muted playsinline>
        Video stream not available.
      </video>
      <div
        id="grid"
        class="absolute top-0 left-0 size-full before:absolute before:left-1/3 before:block before:h-full before:w-1/3 before:border-x before:border-white/35 after:absolute after:top-1/3 after:block after:h-1/3 after:w-full after:border-y after:border-white/35"
      ></div>
    </div>

    <footer class="fixed bottom-0 left-1/2 container -translate-x-1/2">
      <div
        id="filter-selection"
        class="scrollbar-none flex items-center gap-3 overflow-x-scroll px-3"
      ></div>

      <div
        id="camera-buttons"
        class="flex items-center justify-evenly py-12 *:cursor-pointer *:transition-opacity *:hover:opacity-80"
      >
        <button id="switch-camera" aria-label="Switch Camera">
          <iconify-icon
            icon="lucide:switch-camera"
            width="24"
            height="24"
            class="text-white"
          ></iconify-icon>
        </button>

        <button
          id="snap"
          class="size-14 rounded-full bg-white outline-2 outline-offset-3 outline-white active:bg-white/60"
          aria-label="Take Snapshot"
        ></button>

        <button id="toggle-torch" aria-label="Toggle Torch">
          <iconify-icon
            icon="lucide:zap"
            width="24"
            height="24"
            class="text-white"
          ></iconify-icon>
        </button>
      </div>
    </footer>

    <canvas hidden></canvas>
    <a id="photo" download hidden></a>

    <!-- Iconify Web Component -->
    <script src="https://code.iconify.design/iconify-icon/3.0.2/iconify-icon.min.js"></script>
    <!-- Main JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
