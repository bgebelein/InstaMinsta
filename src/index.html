<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quadra Cam</title>
    <link rel="stylesheet" href="styles.min.css" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="img/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="img/favicon/favicon-96x96.png"
    />
    <link rel="manifest" href="site.webmanifest" />
    <link
      rel="mask-icon"
      href="img/favicon/safari-pinned-tab.svg"
      color="#000000"
    />
    <meta name="apple-mobile-web-app-title" content="Quadra Cam" />
    <meta name="application-name" content="Quadra Cam" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body class="flex min-h-svh touch-manipulation flex-col bg-black">
    <header class="grow content-center">
      <div id="camera" class="relative mx-auto aspect-square max-h-screen">
        <video
          id="video-preview"
          class="size-full object-cover object-center"
          muted
          playsinline
        >
          Video stream not available.
        </video>
        <div
          id="grid"
          class="absolute top-0 left-0 size-full before:absolute before:left-1/3 before:block before:h-full before:w-1/3 before:border-x before:border-white/30 after:absolute after:top-1/3 after:block after:h-1/3 after:w-full after:border-y after:border-white/30"
        ></div>

        <canvas class="absolute top-0 left-0 z-10 size-full" hidden></canvas>
      </div>
    </header>

    <footer class="flex flex-col gap-12 py-12">
      <div
        id="filter-selection"
        class="scrollbar-none flex snap-x snap-proximity items-center gap-3 overflow-x-scroll px-3 *:snap-center"
      ></div>

      <div
        id="camera-buttons"
        class="mx-auto flex w-full max-w-sm items-center justify-evenly py-2 *:cursor-pointer *:transition-colors"
      >
        <button
          id="switch-camera"
          aria-label="Switch Camera"
          class="rounded-full p-4 leading-1 transition-opacity hover:opacity-80 duration-300"
        >
          <iconify-icon
            icon="lucide:switch-camera"
            width="24"
            height="24"
            class="text-white"
          ></iconify-icon>
        </button>

        <button
          id="snap"
          class="size-14 rounded-full bg-white outline-2 outline-offset-3 outline-white hover:bg-white/80 active:bg-white/40 transition-colors duration-300"
          aria-label="Take Snapshot"
        ></button>

        <button
          id="toggle-torch"
          aria-label="Toggle Torch"
          class="rounded-full p-4 leading-1 transition-opacity hover:opacity-80 active:bg-black/40 disabled:cursor-not-allowed disabled:opacity-20 duration-300"
        >
          <iconify-icon
            icon="lucide:zap"
            width="24"
            height="24"
            class="text-white"
          ></iconify-icon>
        </button>
      </div>
    </footer>

    <a id="photo" download hidden></a>

    <!-- Iconify Web Component -->
    <script src="https://code.iconify.design/iconify-icon/3.0.2/iconify-icon.min.js"></script>
    <!-- Main JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
